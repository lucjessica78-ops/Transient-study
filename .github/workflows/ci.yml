name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ngspice is the actual transient-analysis engine this tool relies on.
      # It ships in Ubuntu's universe repo, so a plain apt-get install works
      # on the standard ubuntu-latest runner -- no custom container needed.
      - name: Install ngspice
        run: |
          sudo apt-get update
          sudo apt-get install -y ngspice
          ngspice -v

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (editable) + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -v

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-py${{ matrix.python-version }}
          path: dist/
          if-no-files-found: error
