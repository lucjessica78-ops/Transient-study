name: Build Windows EXE

# Manually triggerable from the Actions tab (Run workflow button), and also
# runs automatically when you push a version tag (git tag v0.1.0 && git push
# origin v0.1.0), same as the release workflow.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + PyInstaller
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build standalone exe with PyInstaller
        run: pyinstaller --onefile --name snubber-analyzer windows_entry.py

      # A plain PyInstaller exe only bundles the Python code -- it does NOT
      # include ngspice, which is a separate program this tool calls out to.
      # So we download the official ngspice Windows binary here and ship it
      # in a Spice64 folder next to the .exe. src/snubber_analyzer/simulate.py
      # already knows to look for Spice64/bin/ngspice_con.exe next to a
      # frozen executable.
      - name: Download ngspice (official Windows binary)
        shell: pwsh
        run: |
          # sourceforge.net/.../download is the human-facing page and can
          # return a Cloudflare bot-challenge (a JS page, not the file) to
          # non-browser clients like this runner. downloads.sourceforge.net
          # is SourceForge's direct-mirror endpoint -- a plain HTTP redirect
          # straight to a mirror server, with no JS challenge in the way.
          $url = "https://downloads.sourceforge.net/project/ngspice/ng-spice-rework/46/ngspice-46_64.7z"
          $headers = @{ "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" }

          Invoke-WebRequest -Uri $url -Headers $headers -OutFile ngspice.7z -MaximumRedirection 10

          $size = (Get-Item ngspice.7z).Length
          Write-Host "Downloaded ngspice.7z: $size bytes"
          if ($size -lt 1000000) {
            Write-Host "----- First 2000 chars of downloaded file (likely not the real archive) -----"
            Get-Content ngspice.7z -TotalCount 40
            throw "Downloaded file is too small to be the real ngspice archive (expected ~10 MB). Got $size bytes -- see content above."
          }

          & "C:\Program Files\7-Zip\7z.exe" x ngspice.7z -ongspice_extracted -y

      - name: Assemble the release folder (exe + ngspice side by side)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release\snubber-analyzer -Force | Out-Null
          Copy-Item dist\snubber-analyzer.exe release\snubber-analyzer\
          Copy-Item -Recurse ngspice_extracted\Spice64 release\snubber-analyzer\Spice64
          Copy-Item examples\example_config.json release\snubber-analyzer\example_config.json -ErrorAction SilentlyContinue

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: snubber-analyzer-windows
          path: release/snubber-analyzer/
          if-no-files-found: error
