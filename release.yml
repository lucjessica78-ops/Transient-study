name: Release

# Triggers when you push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to attach files to a GitHub Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ngspice
        run: |
          sudo apt-get update
          sudo apt-get install -y ngspice

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite before releasing
        run: pytest -v

      - name: Build sdist and wheel
        run: python -m build

      - name: Create GitHub Release and attach build artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

      # Optional: uncomment to also publish to PyPI. Requires a PYPI_API_TOKEN
      # secret set under Settings -> Secrets and variables -> Actions.
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
